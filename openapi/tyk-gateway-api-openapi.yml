  /tyk/reload:
    get:
      description: >-
        Tyk is capable of reloading configurations without having to stop
        serving requests. This means that API configurations can be added at
        runtime, or even modified at runtime and those rules applied immediately
        without any downtime.
      operationId: hotReload
      parameters:
      - description: >-
          Block a response until the reload is performed. This can be useful
          in scripting environments like CI/CD workflows.
        example: false
        in: query
        name: block
        required: false
        schema:
          enum:
          - true
          - false
          type: boolean
      responses:
        '200':
          content:
            application/json:
              example:
                message: ''
                status: ok
              schema:
                $ref: '#/components/schemas/ApiStatusMessage'
          description: Reload gateway.
        '403':
          content:
            application/json:
              example:
                message: Attempted administrative access with invalid or missing key!
                status: error
              schema:
                $ref: '#/components/schemas/ApiStatusMessage'
          description: Forbidden
      summary: Tyk Hot-reload a Single Node.
      tags:
      - Hot Reload
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tyk/reload/group:
    get:
      description: >-
        To reload a whole group of Tyk nodes (without using the Dashboard or
        host manager). You can send an API request to a single node, this node
        will then send a notification through the pub/sub infrastructure to all
        other listening nodes (including the host manager if it is being used to
        manage Nginx) which will then trigger a global reload.
      operationId: hotReloadGroup
      responses:
        '200':
          content:
            application/json:
              example:
                message: ''
                status: ok
              schema:
                $ref: '#/components/schemas/ApiStatusMessage'
          description: Reload the Tyk Gateway.
        '403':
          content:
            application/json:
              example:
                message: Attempted administrative access with invalid or missing key!
                status: error
              schema:
                $ref: '#/components/schemas/ApiStatusMessage'
          description: Forbidden
      summary: Hot-reload a Group of Tyk Nodes.
      tags:
      - Hot Reload
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /{listen_path}/tyk/batch:
    post:
      description: Endpoint to run batch request.
      operationId: batch
      parameters:
      - description: API listen path
        example: get
        in: path
        name: listen_path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
              requests:
              - body: ''
                headers:
                  authorization: 1dbc83b9c431649d7698faa9797e2900f
                  x-tyk-test: '1'
                  x-tyk-version: '1.2'
                method: GET
                relative_url: get
              - body: ''
                headers:
                  authorization: 1dbc83b9c431649d7698faa9797e2900f
                  x-tyk-test: '2'
                  x-tyk-version: '1.2'
                method: GET
                relative_url: get
              suppress_parallel_execution: false
            schema:
              $ref: '#/components/schemas/BatchRequestStructure'
      responses:
        '200':
          content:
            application/json:
              example:
              - body: '{"message": "success"}'
                code: 200
                headers:
                  Access-Control-Allow-Credentials:
                  - 'true'
                  Content-Type:
                  - application/json
                relative_url: get
              schema:
                items:
                  $ref: '#/components/schemas/BatchReplyUnit'
                type: array
          description: Success.
        '400':
          content:
            application/json:
              example:
                message: Batch request malformed
                status: error
              schema:
                $ref: '#/components/schemas/ApiStatusMessage'
          description: Bad Request
        '403':
          content:
            application/json:
              example:
                message: Attempted administrative access with invalid or missing key!
                status: error
              schema:
                $ref: '#/components/schemas/ApiStatusMessage'
          description: Forbidden
      summary: Tyk Run Batch Request.
      tags:
      - Batch Requests
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
