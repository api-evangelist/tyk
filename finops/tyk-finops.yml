specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Tyk
providerId: tyk
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Gateway
  - API Management
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Tyk: hybrid model combining a free open-source gateway, a usage-based
  Core SaaS tier, a flat-rate Professional subscription, and a custom-contract Enterprise tier.'
sources:
  - https://tyk.io/pricing/
  - https://tyk.io/docs/api-management/rate-limit/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Tyk Technologies Ltd
serviceCategory: API Management
billingModel:
  pricingCategory: Tiered Subscription + Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Tyk
  ServiceCategory: API Management
  ProviderName: Tyk
  PublisherName: Tyk Technologies Ltd
  InvoiceIssuerName: Tyk Technologies Ltd
  BillingCurrency: USD
meters:
  - name: gateway_requests
    description: Requests proxied through the Tyk gateway (Core / consumption-based tier)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - environment
      - deployment_mode
  - name: subscription_period
    description: Flat Professional / Enterprise subscription term
    unit: month
    aggregation: sum
    dimensions:
      - tier
  - name: deployment_environments
    description: Number of distinct gateway environments (cloud, hybrid, self-managed)
    unit: environment
    aggregation: max
    dimensions:
      - deployment_mode
principles:
  - name: Visibility
    description: Use Tyk Dashboard analytics and the gateway's exported metrics (Prometheus, OpenTelemetry)
      to surface request volume and tier consumption per API.
  - name: Allocation
    description: Tag API definitions and policies with consuming team / product so gateway-level usage
      can be attributed back to internal cost centers.
  - name: Optimization
    description: Choose the lowest-cost deployment mode (open-source self-managed vs Tyk Cloud) per workload;
      use rate-limit smoothing and caching policies to avoid pushing upstream usage beyond Core thresholds.
  - name: Accountability
    description: Assign API and gateway environment owners; review consumption against the chosen tier
      (Core vs Professional vs Enterprise) at each renewal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
