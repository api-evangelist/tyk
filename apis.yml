      - type: JSONSchema
        url: json-schema/tyk-mdcb-data-plane-config-schema.json
      - type: JSONLD
        url: json-ld/tyk-mdcb-context.jsonld
      - type: GitHubRepository
        url: https://github.com/TykTechnologies/tyk-sink
