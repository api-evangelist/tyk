  - type: Features
    data:
      - name: API Gateway
        description: >-
          High-performance, open-source API gateway supporting REST, GraphQL,
          gRPC, TCP, and async APIs with low-latency request proxying.
      - name: Rate Limiting
        description: >-
          Configurable rate limiting and throttling policies to protect backend
          services from traffic spikes and abuse.
      - name: Authentication
        description: >-
          Multiple authentication methods including API keys, JWT, OAuth 2.0,
          mutual TLS, OpenID Connect, and basic auth.
      - name: Analytics and Monitoring
        description: >-
          Real-time API analytics, traffic monitoring, and detailed logging
          with export to multiple backend stores.
      - name: Developer Portal
        description: >-
          Customizable developer portal for API documentation, key management,
          and developer onboarding.
      - name: GraphQL Support
        description: >-
          Native GraphQL proxy and Universal Data Graph for federating REST and
          GraphQL APIs into a single graph endpoint.
      - name: API Versioning
        description: >-
          Built-in support for API versioning with URL, header, and query
          parameter-based version routing.
      - name: Policy Management
        description: >-
          Centralized access control policies for managing rate limits, quotas,
          and access rights across multiple APIs.
      - name: Multi Data Center
        description: >-
          MDCB enables synchronization of API configurations and keys across
          geographically distributed gateway clusters.
      - name: Plugin System
        description: >-
          Extensible middleware plugin system supporting Go, Python, JavaScript,
          Lua, and gRPC-based custom plugins.
      - name: AI Gateway
        description: >-
          Tyk AI Studio provides an AI gateway for managing, governing, and
          interacting with AI models across your organization.
  - type: UseCases
    data:
      - name: API Monetization
        description: >-
          Enable API-as-a-product strategies with tiered plans, usage tracking,
          and developer self-service through the portal.
      - name: Microservices Gateway
        description: >-
          Centralize traffic management, authentication, and observability for
          microservices architectures.
      - name: Multi-Cloud API Management
        description: >-
          Deploy gateways across cloud, on-premise, and hybrid environments
          with centralized management.
      - name: Legacy API Modernization
        description: >-
          Wrap legacy SOAP and XML APIs with modern REST or GraphQL interfaces
          using Tyk's transformation middleware.
      - name: Partner API Program
        description: >-
          Manage third-party developer access with fine-grained policies,
          quota management, and analytics per consumer.
      - name: AI API Management
        description: >-
          Govern and manage AI model APIs with rate limiting, access control,
          and usage analytics through Tyk AI Studio.
  - type: Integrations
    data:
      - name: Kubernetes
        description: >-
          Tyk Operator provides native Kubernetes integration for managing API
          definitions and policies as custom resources.
      - name: Terraform
        description: >-
          Infrastructure-as-code provider for managing Tyk configurations
          through Terraform.
      - name: Keycloak
        description: >-
          Integration with Keycloak for OAuth 2.0 and OpenID Connect
          authentication flows.
      - name: Auth0
        description: >-
          Support for Auth0 as an identity provider for JWT validation and
          OAuth 2.0 token management.
      - name: Prometheus
        description: >-
          Export gateway metrics to Prometheus for monitoring and alerting
          with Grafana dashboards.
      - name: OpenTelemetry
        description: >-
          Distributed tracing integration with OpenTelemetry for end-to-end
          request visibility.
      - name: Backstage
        description: >-
          Backstage plugin for viewing and managing Tyk API definitions from
          within the Backstage developer portal.
      - name: Jenkins
        description: >-
          CI/CD integration for automated API deployment and configuration
          updates through Jenkins pipelines.
      - name: Ansible
        description: >-
          Ansible playbooks for automated Tyk gateway and dashboard
          provisioning and configuration.
      - name: Helm Charts
        description: >-
          Official Helm charts for deploying Tyk components on Kubernetes
          clusters.
