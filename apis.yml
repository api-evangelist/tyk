aid: tyk
name: Tyk
description: >-
  Tyk is an open-source API gateway and management platform supporting REST,
  GraphQL, gRPC, and Async APIs with a developer portal, analytics, and
  flexible deployment across cloud, on-premise, and hybrid environments.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Gateway
  - API Management
  - GraphQL
  - Open Source
