naftiko: 1.0.0-alpha2
info:
  label: Stream Tyk gateway metrics into Datadog
  description: Forward Tyk gateway request counts, latency, and error rates into Datadog as custom metrics for unified API observability dashboards.
  tags:
  - Tyk
  - Integration
  - Observability
  - datadog
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    TYK_API_KEY: TYK_API_KEY
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: tyk
    baseUri: https://tyk-gateway.example.com
    description: Tyk API operations consumed by this integration.
    resources:
    - name: tyk-apis
      path: /tyk/apis
      operations:
      - name: listapis
        method: GET
        description: List Tyk APIs to label the metric series by API ID and name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: hello
      path: /hello
      operations:
      - name: gatewayhealth
        method: GET
        description: Tyk gateway health check used to mark the metric series up/down.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  - type: http
    namespace: datadog
    baseUri: https://api.datadoghq.com
    description: Datadog Metrics API operations consumed by this integration.
    resources:
    - name: api-v2-series
      path: /api/v2/series
      operations:
      - name: submitmetrics
        method: POST
        description: 'Datadog Metrics API: submitMetrics'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-events
      path: /api/v1/events
      operations:
      - name: postevent
        method: POST
        description: 'Datadog Metrics API: postEvent'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: tyk-datadog-mcp
    description: MCP adapter for the tyk-datadog integration.
    tools:
    - name: tyk_datadog
      description: Execute the tyk datadog integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: tyk-datadog-rest
    port: 8080
    description: REST adapter for the tyk-datadog integration.
    resources:
    - path: /tyk-datadog
      name: tyk-datadog
      description: REST surface for the tyk-datadog integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the tyk-datadog integration.
        call: tyk_datadog
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
