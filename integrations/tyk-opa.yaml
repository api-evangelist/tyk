naftiko: 1.0.0-alpha2
info:
  label: Enforce Open Policy Agent decisions on Tyk policy changes
  description: When a Tyk Policy is created or updated, evaluate the change against an OPA policy bundle and reject mutations that violate governance rules.
  tags:
  - Tyk
  - Integration
  - Governance
  - opa
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    TYK_API_KEY: TYK_API_KEY
    OPA_API_KEY: OPA_API_KEY
capability:
  consumes:
  - type: http
    namespace: tyk
    baseUri: https://tyk-gateway.example.com
    description: Tyk API operations consumed by this integration.
    resources:
    - name: tyk-policies
      path: /tyk/policies
      operations:
      - name: listpolicies
        method: GET
        description: List current Tyk policies to feed OPA evaluation context.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: tyk-policies-polid
      path: /tyk/policies/{polID}
      operations:
      - name: getpolicy
        method: GET
        description: Retrieve the Tyk policy under change.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: polID
          in: path
          type: string
          description: Path parameter polID.
          required: true
  - type: http
    namespace: opa
    baseUri: https://opa.internal.example.com
    description: Open Policy Agent Data API operations consumed by this integration.
    resources:
    - name: v1-data-tyk-policy-allow
      path: /v1/data/tyk/policy/allow
      operations:
      - name: evaluatepolicy
        method: POST
        description: 'Open Policy Agent Data API: evaluatePolicy'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: tyk-opa-mcp
    description: MCP adapter for the tyk-opa integration.
    tools:
    - name: tyk_opa
      description: Execute the tyk opa integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: tyk-opa-rest
    port: 8080
    description: REST adapter for the tyk-opa integration.
    resources:
    - path: /tyk-opa
      name: tyk-opa
      description: REST surface for the tyk-opa integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the tyk-opa integration.
        call: tyk_opa
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
