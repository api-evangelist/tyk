naftiko: 1.0.0-alpha2
info:
  label: Meter Tyk API usage into Stripe subscription items
  description: For each Tyk key bound to a paying customer, aggregate request counts and push usage records into the matching Stripe metered subscription item for usage-based billing.
  tags:
  - Tyk
  - Integration
  - Billing
  - stripe
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    TYK_API_KEY: TYK_API_KEY
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: tyk
    baseUri: https://tyk-gateway.example.com
    description: Tyk API operations consumed by this integration.
    resources:
    - name: tyk-keys
      path: /tyk/keys
      operations:
      - name: listkeys
        method: GET
        description: List Tyk keys to attribute API usage by customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: tyk-keys-keyid
      path: /tyk/keys/{keyID}
      operations:
      - name: getkey
        method: GET
        description: Fetch a Tyk key to read its quota and remaining counters.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keyID
          in: path
          type: string
          description: Path parameter keyID.
          required: true
    - name: tyk-org-keys
      path: /tyk/org/keys
      operations:
      - name: listorgkeys
        method: GET
        description: List per-organization keys to roll usage up to the billing account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  - type: http
    namespace: stripe
    baseUri: https://api.stripe.com
    description: Stripe API operations consumed by this integration.
    resources:
    - name: v1-subscription-items-subscription-item-usage-records
      path: /v1/subscription_items/{subscription_item}/usage_records
      operations:
      - name: createusagerecord
        method: POST
        description: 'Stripe API: createUsageRecord'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription_item
          in: path
          type: string
          description: Path parameter subscription_item.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: tyk-stripe-mcp
    description: MCP adapter for the tyk-stripe integration.
    tools:
    - name: tyk_stripe
      description: Execute the tyk stripe integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: tyk-stripe-rest
    port: 8080
    description: REST adapter for the tyk-stripe integration.
    resources:
    - path: /tyk-stripe
      name: tyk-stripe
      description: REST surface for the tyk-stripe integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the tyk-stripe integration.
        call: tyk_stripe
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
