naftiko: 1.0.0-alpha2
info:
  label: Mirror Keycloak clients as Tyk OAuth clients
  description: When a Keycloak client is created or updated, mirror it as a Tyk OAuth client bound to the right API so the same identity provider drives both Tyk and Keycloak.
  tags:
  - Tyk
  - Integration
  - Identity
  - keycloak
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    TYK_API_KEY: TYK_API_KEY
    KEYCLOAK_API_KEY: KEYCLOAK_API_KEY
capability:
  consumes:
  - type: http
    namespace: tyk
    baseUri: https://tyk-gateway.example.com
    description: Tyk API operations consumed by this integration.
    resources:
    - name: tyk-oauth-clients-create
      path: /tyk/oauth/clients/create
      operations:
      - name: createoauthclient
        method: POST
        description: Create a Tyk OAuth client mirroring a Keycloak client.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tyk-oauth-clients-apiid
      path: /tyk/oauth/clients/{apiID}
      operations:
      - name: listoauthclients
        method: GET
        description: List Tyk OAuth clients to reconcile with Keycloak.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiID
          in: path
          type: string
          description: Path parameter apiID.
          required: true
    - name: tyk-oauth-revoke
      path: /tyk/oauth/revoke
      operations:
      - name: revoketoken
        method: POST
        description: Revoke a Tyk-issued OAuth token when the matching Keycloak credential rotates.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: keycloak
    baseUri: https://keycloak.example.com
    description: Keycloak Admin REST API operations consumed by this integration.
    resources:
    - name: admin-realms-realm-clients
      path: /admin/realms/{realm}/clients
      operations:
      - name: listclients
        method: GET
        description: 'Keycloak Admin REST API: listClients'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: realm
          in: path
          type: string
          description: Path parameter realm.
          required: true
    - name: admin-realms-realm-clients
      path: /admin/realms/{realm}/clients
      operations:
      - name: createclient
        method: POST
        description: 'Keycloak Admin REST API: createClient'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: realm
          in: path
          type: string
          description: Path parameter realm.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: tyk-keycloak-mcp
    description: MCP adapter for the tyk-keycloak integration.
    tools:
    - name: tyk_keycloak
      description: Execute the tyk keycloak integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: tyk-keycloak-rest
    port: 8080
    description: REST adapter for the tyk-keycloak integration.
    resources:
    - path: /tyk-keycloak
      name: tyk-keycloak
      description: REST surface for the tyk-keycloak integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the tyk-keycloak integration.
        call: tyk_keycloak
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
