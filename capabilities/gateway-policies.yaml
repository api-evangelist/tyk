    port: 9090
    transport: http
    description: MCP adapter for Tyk Gateway API — Policies. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: tyk-list-policies
      description: Tyk List Policies.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-policies.listpolicies
      outputParameters:
      - type: object
        mapping: $.
    - name: tyk-create-policy
      description: Tyk Create a Policy.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gateway-policies.addpolicy
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: tyk-delete-policy
      description: Tyk Delete a Policy.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gateway-policies.deletepolicy
      with:
        polID: tools.polID
      outputParameters:
      - type: object
        mapping: $.
    - name: tyk-get-policy
      description: Tyk Get a Policy.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gateway-policies.getpolicy
      with:
        polID: tools.polID
      outputParameters:
      - type: object
        mapping: $.
    - name: tyk-update-policy
      description: Tyk Update a Policy.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: gateway-policies.updatepolicy
      with:
        polID: tools.polID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
