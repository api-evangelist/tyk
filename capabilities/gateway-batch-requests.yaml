naftiko: 1.0.0-alpha2
info:
  label: Tyk Gateway API — Batch Requests
  description: 'Tyk Gateway API — Batch Requests. 1 operations. Lead operation: Tyk Run Batch Request.. Self-contained Naftiko
    capability covering one Tyk business surface.'
  tags:
  - Tyk
  - Batch Requests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TYK_API_KEY: TYK_API_KEY
capability:
  consumes:
  - type: http
    namespace: gateway-batch-requests
    baseUri: https://{tenant}
    description: Tyk Gateway API — Batch Requests business capability. Self-contained, no shared references.
    resources:
    - name: listen_path-tyk-batch
      path: /{listen_path}/tyk/batch
      operations:
      - name: batch
        method: POST
        description: Tyk Run Batch Request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: listen_path
          in: path
          type: string
          description: API listen path
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-Tyk-Authorization
      value: '{{env.TYK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: gateway-batch-requests-rest
    port: 8080
    description: REST adapter for Tyk Gateway API — Batch Requests. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{listen-path}/tyk/batch
      name: listen-path-tyk-batch
      description: REST surface for listen_path-tyk-batch.
      operations:
      - method: POST
        name: batch
        description: Tyk Run Batch Request.
        call: gateway-batch-requests.batch
        with:
          listen_path: rest.listen_path
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gateway-batch-requests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tyk Gateway API — Batch Requests. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: tyk-run-batch-request
      description: Tyk Run Batch Request.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gateway-batch-requests.batch
      with:
        listen_path: tools.listen_path
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
