naftiko: 1.0.0-alpha2
info:
  label: Tyk Platform Administration
  description: Platform administration workflow combining Dashboard Admin and MDCB APIs for platform administrators to manage
    organizations, multi-data center deployments, and system diagnostics.
  tags:
  - Administration
  - MDCB
  - Platform
  - Tyk
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TYK_ADMIN_SECRET: TYK_ADMIN_SECRET
    TYK_MDCB_API_KEY: TYK_MDCB_API_KEY
capability:
  consumes:
  - type: http
    namespace: tyk-dashboard-admin
    baseUri: '{TYK_DASHBOARD_URL}'
    description: Tyk Dashboard Admin API for super-administrative access.
    authentication:
      type: apikey
      key: admin-auth
      value: '{{TYK_ADMIN_SECRET}}'
      placement: header
    resources:
    - name: organizations
      path: /admin/organisations
      description: Organization management
      operations:
      - name: list-organizations
        method: GET
        description: List all organizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-organization
        method: POST
        description: Create a new organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            org: '{{tools.org}}'
      - name: update-organization
        method: PUT
        description: Update an organization
        inputParameters:
        - name: orgID
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            org: '{{tools.org}}'
      - name: delete-organization
        method: DELETE
        description: Delete an organization
        inputParameters:
        - name: orgID
          in: path
          type: string
          required: true
          description: Organization ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /admin/users
      description: Admin user management
      operations:
      - name: list-admin-users
        method: GET
        description: List admin users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-admin-user
        method: POST
        description: Create an admin user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            user: '{{tools.user}}'
    - name: system
      path: /admin/system
      description: System operations
      operations:
      - name: export-system
        method: GET
        description: Export system configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: import-system
        method: POST
        description: Import system configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            data: '{{tools.data}}'
  - type: http
    namespace: tyk-mdcb
    baseUri: '{TYK_MDCB_URL}'
    description: Tyk MDCB API for data plane monitoring and diagnostics.
    authentication:
      type: apikey
      key: x-tyk-authorization
      value: '{{TYK_MDCB_API_KEY}}'
      placement: header
    resources:
    - name: dataplanes
      path: /dataplanes
      description: Data plane monitoring
      operations:
      - name: list-dataplanes
        method: GET
        description: List all connected data plane nodes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-dataplane
        method: GET
        description: Get details for a specific data plane
        inputParameters:
        - name: dataplaneID
          in: path
          type: string
          required: true
          description: Data plane ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: health
      path: /health
      description: Health check
      operations:
      - name: check-health
        method: GET
        description: MDCB health check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: diagnostics
      path: /debug/pprof
      description: Performance profiling diagnostics
      operations:
      - name: get-profile
        method: GET
        description: Get pprof profile data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: tyk-platform-admin-api
    description: Unified REST API for Tyk platform administration.
    resources:
    - path: /v1/organizations
      name: organizations
      description: Organization management
      operations:
      - method: GET
        name: list-organizations
        description: List all organizations
        call: tyk-dashboard-admin.list-organizations
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-organization
        description: Create a new organization
        call: tyk-dashboard-admin.create-organization
        with:
          org: rest.org
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin-users
      name: admin-users
      description: Admin user management
      operations:
      - method: GET
        name: list-admin-users
        description: List admin users
        call: tyk-dashboard-admin.list-admin-users
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dataplanes
      name: dataplanes
      description: Data plane monitoring
      operations:
      - method: GET
        name: list-dataplanes
        description: List all connected data planes
        call: tyk-mdcb.list-dataplanes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/health
      name: health
      description: MDCB health
      operations:
      - method: GET
        name: check-mdcb-health
        description: Check MDCB health
        call: tyk-mdcb.check-health
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: tyk-platform-admin-mcp
    transport: http
    description: MCP server for AI-assisted Tyk platform administration.
    tools:
    - name: list-organizations
      description: List all Tyk organizations
      hints:
        readOnly: true
        openWorld: true
      call: tyk-dashboard-admin.list-organizations
      outputParameters:
      - type: object
        mapping: $.
    - name: create-organization
      description: Create a new organization
      hints:
        readOnly: false
      call: tyk-dashboard-admin.create-organization
      with:
        org: tools.org
      outputParameters:
      - type: object
        mapping: $.
    - name: update-organization
      description: Update an organization
      hints:
        readOnly: false
        idempotent: true
      call: tyk-dashboard-admin.update-organization
      with:
        orgID: tools.orgID
        org: tools.org
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-organization
      description: Delete an organization
      hints:
        destructive: true
        idempotent: true
      call: tyk-dashboard-admin.delete-organization
      with:
        orgID: tools.orgID
      outputParameters:
      - type: object
        mapping: $.
    - name: list-admin-users
      description: List all admin users
      hints:
        readOnly: true
      call: tyk-dashboard-admin.list-admin-users
      outputParameters:
      - type: object
        mapping: $.
    - name: create-admin-user
      description: Create an admin user
      hints:
        readOnly: false
      call: tyk-dashboard-admin.create-admin-user
      with:
        user: tools.user
      outputParameters:
      - type: object
        mapping: $.
    - name: export-system
      description: Export system configuration
      hints:
        readOnly: true
      call: tyk-dashboard-admin.export-system
      outputParameters:
      - type: object
        mapping: $.
    - name: import-system
      description: Import system configuration
      hints:
        readOnly: false
      call: tyk-dashboard-admin.import-system
      with:
        data: tools.data
      outputParameters:
      - type: object
        mapping: $.
    - name: list-dataplanes
      description: List all connected data plane nodes
      hints:
        readOnly: true
        openWorld: true
      call: tyk-mdcb.list-dataplanes
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataplane
      description: Get details for a specific data plane
      hints:
        readOnly: true
      call: tyk-mdcb.get-dataplane
      with:
        dataplaneID: tools.dataplaneID
      outputParameters:
      - type: object
        mapping: $.
    - name: check-mdcb-health
      description: Check MDCB health
      hints:
        readOnly: true
      call: tyk-mdcb.check-health
      outputParameters:
      - type: object
        mapping: $.
    - name: get-diagnostics
      description: Get pprof diagnostic data from MDCB
      hints:
        readOnly: true
      call: tyk-mdcb.get-profile
      outputParameters:
      - type: object
        mapping: $.
