naftiko: 1.0.0-alpha2
info:
  label: Tyk MDCB Data Planes and Diagnostics API — Config
  description: 'Tyk MDCB Data Planes and Diagnostics API — Config. 1 operations. Lead operation: Tyk Retrieve Current Configuration
    Status. Self-contained Naftiko capability covering one Tyk business surface.'
  tags:
  - Tyk
  - Config
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TYK_API_KEY: TYK_API_KEY
capability:
  consumes:
  - type: http
    namespace: mdcb-config
    baseUri: https://{tenant}
    description: Tyk MDCB Data Planes and Diagnostics API — Config business capability. Self-contained, no shared references.
    resources:
    - name: config
      path: /config
      operations:
      - name: configget
        method: GET
        description: Tyk Retrieve Current Configuration Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Tyk-Authorization
          in: header
          type: string
          description: Secret value set in sink.conf
          required: true
    authentication:
      type: apikey
      key: X-Tyk-Authorization
      value: '{{env.TYK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mdcb-config-rest
    port: 8080
    description: REST adapter for Tyk MDCB Data Planes and Diagnostics API — Config. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/config
      name: config
      description: REST surface for config.
      operations:
      - method: GET
        name: configget
        description: Tyk Retrieve Current Configuration Status
        call: mdcb-config.configget
        with:
          X-Tyk-Authorization: rest.X-Tyk-Authorization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mdcb-config-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tyk MDCB Data Planes and Diagnostics API — Config. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: tyk-retrieve-current-configuration-status
      description: Tyk Retrieve Current Configuration Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mdcb-config.configget
      with:
        X-Tyk-Authorization: tools.X-Tyk-Authorization
      outputParameters:
      - type: object
        mapping: $.
