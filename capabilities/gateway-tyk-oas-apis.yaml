naftiko: 1.0.0-alpha2
info:
  label: Tyk Gateway API — Tyk OAS APIs
  description: 'Tyk Gateway API — Tyk OAS APIs. 10 operations. Lead operation: List All Apis in Tyk Oas Api Format.. Self-contained
    Naftiko capability covering one Tyk business surface.'
  tags:
  - Tyk
  - Tyk OAS APIs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TYK_API_KEY: TYK_API_KEY
capability:
  consumes:
  - type: http
    namespace: gateway-tyk-oas-apis
    baseUri: https://{tenant}
    description: Tyk Gateway API — Tyk OAS APIs business capability. Self-contained, no shared references.
    resources:
    - name: tyk-apis-oas
      path: /tyk/apis/oas
      operations:
      - name: listapisoas
        method: GET
        description: List All Apis in Tyk Oas Api Format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mode
          in: query
          type: string
          description: 'By default mode is empty which means it will return the Tyk API OAS spec including the x-tyk-api-gateway
            part. '
      - name: createapioas
        method: POST
        description: Create an Api With Tyk Oas Format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: base_api_id
          in: query
          type: string
          description: The base API which the new version will be linked to.
        - name: base_api_version_name
          in: query
          type: string
          description: The version name of the base API while creating the first version. This doesn't have to be sent for
            the next versions but if it is set, it will override base AP
        - name: new_version_name
          in: query
          type: string
          description: The version name of the created version.
        - name: set_default
          in: query
          type: boolean
          description: If true, the new version is set as default version.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: tyk-apis-oas-export
      path: /tyk/apis/oas/export
      operations:
      - name: downloadapisoaspublic
        method: GET
        description: Download All Tyk Oas Format Apis.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mode
          in: query
          type: string
          description: 'By default mode is empty which means it will return the Tyk API OAS spec including the x-tyk-api-gateway
            part. '
    - name: tyk-apis-oas-import
      path: /tyk/apis/oas/import
      operations:
      - name: importoas
        method: POST
        description: Import an Api in Tyk Oas Format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: base_api_id
          in: query
          type: string
          description: The base API which the new version will be linked to.
        - name: base_api_version_name
          in: query
          type: string
          description: The version name of the base API while creating the first version. This doesn't have to be sent for
            the next versions but if it is set, it will override base AP
        - name: new_version_name
          in: query
          type: string
          description: The version name of the created version.
        - name: set_default
          in: query
          type: boolean
          description: If true, the new version is set as default version.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: tyk-apis-oas-apiID
      path: /tyk/apis/oas/{apiID}
      operations:
      - name: deleteoasapi
        method: DELETE
        description: Deleting a Tyk Oas Api.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiID
          in: path
          type: string
          description: The API ID.
          required: true
      - name: getoasapi
        method: GET
        description: Get a Tyk Oas Api Definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mode
          in: query
          type: string
          description: 'By default mode is empty which means it will return the Tyk API OAS spec including the x-tyk-api-gateway
            part. '
        - name: apiID
          in: path
          type: string
          description: ID of the API you want to fetch
          required: true
      - name: patchapioas
        method: PATCH
        description: Patch Api in Tyk Oas Format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiID
          in: path
          type: string
          description: ID of the API you want to fetch.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: updateapioas
        method: PUT
        description: Update a Tyk Oas Api Definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiID
          in: path
          type: string
          description: ID of the API you want to fetch
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: tyk-apis-oas-apiID-export
      path: /tyk/apis/oas/{apiID}/export
      operations:
      - name: downloadapioaspublic
        method: GET
        description: Download a Tyk Oas Format Api.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiID
          in: path
          type: string
          description: ID of the API you want to fetch.
          required: true
        - name: mode
          in: query
          type: string
          description: 'By default mode is empty which means it will return the Tyk API OAS spec including the x-tyk-api-gateway
            part. '
    - name: tyk-apis-oas-apiID-versions
      path: /tyk/apis/oas/{apiID}/versions
      operations:
      - name: listoasapiversions
        method: GET
        description: Listing Versions of a Tyk Oas Api.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiID
          in: path
          type: string
          description: ID of the API you want to fetch.
          required: true
    authentication:
      type: apikey
      key: X-Tyk-Authorization
      value: '{{env.TYK_API_KEY}}'
      placement: header
