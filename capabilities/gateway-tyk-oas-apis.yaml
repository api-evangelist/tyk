        call: gateway-tyk-oas-apis.updateapioas
        with:
          apiID: rest.apiID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tyk/apis/oas/{apiid}/export
      name: tyk-apis-oas-apiid-export
      description: REST surface for tyk-apis-oas-apiID-export.
      operations:
