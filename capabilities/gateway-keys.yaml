        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: hashed
          in: query
          type: boolean
          description: When set to true the key_hash returned will be similar to the un-hashed key name.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
