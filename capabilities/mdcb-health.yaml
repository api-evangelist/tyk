naftiko: 1.0.0-alpha2
info:
  label: Tyk MDCB Data Planes and Diagnostics API — Health
  description: 'Tyk MDCB Data Planes and Diagnostics API — Health. 1 operations. Lead operation: Tyk Health Check. Self-contained
    Naftiko capability covering one Tyk business surface.'
  tags:
  - Tyk
  - Health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TYK_API_KEY: TYK_API_KEY
capability:
  consumes:
  - type: http
    namespace: mdcb-health
    baseUri: https://{tenant}
    description: Tyk MDCB Data Planes and Diagnostics API — Health business capability. Self-contained, no shared references.
    resources:
    - name: health
      path: /health
      operations:
      - name: healthget
        method: GET
        description: Tyk Health Check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Tyk-Authorization
      value: '{{env.TYK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mdcb-health-rest
    port: 8080
    description: REST adapter for Tyk MDCB Data Planes and Diagnostics API — Health. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/health
      name: health
      description: REST surface for health.
      operations:
      - method: GET
        name: healthget
        description: Tyk Health Check
        call: mdcb-health.healthget
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mdcb-health-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tyk MDCB Data Planes and Diagnostics API — Health. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: tyk-health-check
      description: Tyk Health Check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mdcb-health.healthget
      outputParameters:
      - type: object
        mapping: $.
