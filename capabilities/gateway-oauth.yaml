    - name: tyk-revoke-token
      description: Tyk Revoke Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gateway-oauth.revokesingletoken
      with:
        body: tools.body
      outputParameters:
      - type: object
