specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Tyk
providerId: tyk
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Gateway
  - API Management
  - GraphQL
  - Open Source
description: Tyk publishes a three-tier commercial offering (Core, Professional, Enterprise) on top of
  a fully featured open-source gateway. Numeric per-tier request quotas and per-second rates are not
  published; pricing is consumption-based for Core, flat unlimited for Professional, and contact-sales
  for Enterprise. A 48-hour fully-featured Tyk Cloud free trial is available.
sources:
  - https://tyk.io/pricing/
  - https://tyk.io/docs/api-management/rate-limit/
plans:
  - id: tyk-open-source
    name: Tyk Open Source
    type: freemium
    description: Free, fully-featured open-source API gateway distributed via GitHub. Self-hosted; community
      support only.
    entries:
      - label: Self-Hosted Gateway
        name: self_hosted_gateway
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Open-Source Gateway
      - name: Community Support
      - name: GitHub Source Access
  - id: tyk-core
    name: Core
    type: usage-based
    description: Usage-based commercial tier for startups and scale-ups. Cloud, hybrid, or self-managed
      deployment. Unlimited API gateways and developer portal included.
    entries:
      - label: Consumption-Based
        name: consumption
        type: metered
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://tyk.io/pricing/
        userMultiplied: false
    elements:
      - name: Unlimited API Gateways
      - name: Developer Portal
      - name: Enhanced Success Plan
      - name: Cloud / Hybrid / Self-Managed Deployment
  - id: tyk-professional
    name: Professional
    type: subscription
    description: Flat-priced unlimited tier for high-growth teams standardizing on APIs. One price, unlimited
      access including unlimited API requests per month.
    entries:
      - label: Unlimited Subscription
        name: subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://tyk.io/pricing/
        userMultiplied: false
    elements:
      - name: Unlimited API Gateways
      - name: Unlimited APIs
      - name: Unlimited API Requests
      - name: Developer Portal
      - name: Enhanced Success Plan
  - id: tyk-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced tier for regulated industries, global enterprises, and mission-critical
      platforms. Adds advanced governance, premium support with custom SLAs, multi-region/multi-cloud
      deployments, named CSM, and guided PoC.
    entries:
      - label: Custom Contract
        name: custom_contract
        type: flat
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Everything in Professional
      - name: Advanced Governance and Security
      - name: Premium Support with Custom SLAs
      - name: Multi-Region Deployments
      - name: Multi-Cloud Architecture
      - name: Named Customer Success Manager
      - name: Guided PoC
  - id: tyk-cloud-trial
    name: Tyk Cloud Free Trial
    type: freemium
    description: 48-hour fully-featured Tyk Cloud trial. No credit card required.
    entries:
      - label: Free Trial
        name: free_trial
        type: flat
        metric: varies
        limit: 48
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Full Feature Access
      - name: No Credit Card Required
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
